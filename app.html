  --border:rgba(255,255,255,0.07);
  --border-blue:rgba(15,61,145,0.4);
  --red:#FF4757;
  --amber:#FFB830;
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
html,body,#root{height:100%}
body{font-family:var(--font);background:var(--dark);color:var(--text);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer}
input,select{font-family:var(--font)}

/* ── LAYOUT ── */
.app{min-height:100vh;display:flex;flex-direction:column}
.app-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(15,61,145,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(15,61,145,0.04) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0}

/* ── AUTH SCREENS ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
.auth-wrap::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(15,61,145,0.18) 0%,transparent 70%);top:-150px;right:-150px;pointer-events:none}
.auth-wrap::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,83,0.08) 0%,transparent 70%);bottom:-100px;left:-100px;pointer-events:none}
.auth-card{background:var(--dark-3);border:1px solid var(--border);border-radius:20px;padding:44px;max-width:440px;width:100%;position:relative;overflow:hidden;z-index:1}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--green))}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.auth-logo img{height:38px;width:auto}
.auth-logo-text{display:flex;flex-direction:column;line-height:1.1}
.auth-logo-text .l1{font-weight:800;font-size:1rem;letter-spacing:-0.4px;color:var(--text)}
.auth-logo-text .l1 span{color:var(--green)}
.auth-logo-text .l2{font-weight:500;font-size:.62rem;letter-spacing:2px;color:var(--text-3);text-transform:uppercase}
.auth-title{font-weight:800;font-size:1.6rem;letter-spacing:-0.03em;margin-bottom:8px}
.auth-sub{font-size:.9rem;color:var(--text-2);margin-bottom:32px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.72rem;font-weight:600;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.field input,.field select{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:13px 16px;color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--blue)}
.field select option{background:var(--dark-3)}
.field-error{color:var(--red);font-size:.78rem;margin-top:6px}
.btn{font-weight:700;font-size:.92rem;padding:14px 24px;border-radius:10px;border:none;cursor:pointer;transition:all .2s;width:100%}
.btn-primary{background:var(--green);color:#04150A}
.btn-primary:hover{background:#00E564;box-shadow:0 8px 24px rgba(0,200,83,0.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text-2)}
.btn-secondary:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.btn-ghost{background:transparent;border:none;color:var(--text-2);font-size:.85rem;text-decoration:underline;padding:8px}
.btn-ghost:hover{color:var(--text)}
.auth-switch{text-align:center;margin-top:24px;font-size:.85rem;color:var(--text-3)}
.auth-switch button{background:none;border:none;color:var(--green);font-weight:600;cursor:pointer;font-size:.85rem}

/* ── ONBOARDING ── */
.onboard-progress{display:flex;gap:6px;margin-bottom:28px}
.onboard-dot{height:4px;flex:1;border-radius:2px;background:rgba(255,255,255,0.08)}
.onboard-dot.active{background:var(--green)}
.onboard-dot.done{background:var(--blue-light)}
.chip-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
.chip{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;font-size:.85rem;color:var(--text-2)}
.chip:hover{border-color:rgba(255,255,255,.2)}
.chip.selected{border-color:var(--green);background:rgba(0,200,83,0.08);color:var(--text)}
.chip-emoji{font-size:1.4rem;display:block;margin-bottom:6px}

/* ── APP SHELL ── */
.shell{display:flex;min-height:100vh;position:relative;z-index:1}
.sidebar{width:240px;background:var(--dark-2);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 8px;margin-bottom:32px}
.sb-logo img{height:34px;width:auto}
.sb-logo-text{display:flex;flex-direction:column;line-height:1.1}
.sb-logo-text .l1{font-weight:800;font-size:.95rem;letter-spacing:-0.4px;color:var(--text)}
.sb-logo-text .l1 span{color:var(--green)}
.sb-logo-text .l2{font-weight:500;font-size:.6rem;letter-spacing:2px;color:var(--text-3);text-transform:uppercase}
.sb-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.sb-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;color:var(--text-2);text-decoration:none;font-size:.88rem;font-weight:500;border:none;background:none;cursor:pointer;text-align:left;width:100%;transition:all .15s}
.sb-link:hover{background:rgba(255,255,255,0.03);color:var(--text)}
.sb-link.active{background:rgba(15,61,145,0.18);color:var(--text);border:1px solid rgba(15,61,145,0.3)}
.sb-link-icon{font-size:1.05rem;width:20px;text-align:center}
.sb-footer{border-top:1px solid var(--border);padding-top:16px;margin-top:16px}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:9px}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-light));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.78rem;flex-shrink:0}
.sb-user-info{flex:1;overflow:hidden}
.sb-user-name{font-size:.82rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-plan{font-size:.7rem;color:var(--text-3)}
.sb-logout{font-size:.78rem;color:var(--text-3);background:none;border:none;cursor:pointer;padding:8px;width:100%;text-align:left;margin-top:4px}
.sb-logout:hover{color:var(--red)}

.main{flex:1;overflow-y:auto;padding:32px 40px;max-width:1100px}
.main-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.main-title{font-weight:800;font-size:1.7rem;letter-spacing:-0.03em;margin-bottom:4px}
.main-sub{font-size:.9rem;color:var(--text-2)}

/* ── MOBILE TOP NAV ── */
.mobile-bar{display:none}
.mobile-bottom-nav{display:none}

/* ── CARDS ── */
.card{background:var(--dark-3);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative}
.card-accent::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:16px 16px 0 0}

/* ── DASHBOARD ── */
.score-row{display:flex;align-items:center;gap:18px;padding:20px;background:rgba(15,61,145,0.12);border:1px solid rgba(15,61,145,0.25);border-radius:14px;margin-bottom:20px;flex-wrap:wrap}
.score-num{font-weight:900;font-size:3rem;color:var(--text);letter-spacing:-0.06em;font-family:var(--mono);line-height:1}
.score-info{flex:1;min-width:160px}
.score-lbl{font-size:.7rem;color:var(--text-3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.score-lvl{font-size:1.05rem;font-weight:700;color:var(--green)}
.score-bar-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;margin-top:10px;width:200px}
.score-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--green))}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--dark-3);border:1px solid var(--border);border-radius:14px;padding:18px}
.kpi-lbl{font-size:.7rem;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.kpi-val{font-weight:800;font-size:1.5rem;letter-spacing:-0.03em;font-family:var(--mono)}
.kpi-val.g{color:var(--green)}
.kpi-val.r{color:var(--red)}
.kpi-sub{font-size:.74rem;color:var(--text-3);margin-top:4px}

.goal-card{margin-bottom:20px}
.goal-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.goal-title{font-weight:700;font-size:.95rem}
.goal-pct{font-size:.85rem;color:var(--text-2)}
.goal-bar-bg{height:10px;background:rgba(255,255,255,0.06);border-radius:5px;margin-bottom:10px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .6s ease}
.goal-foot{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text-2)}
.goal-foot strong{color:var(--text)}

.section-title{font-weight:700;font-size:1.1rem;letter-spacing:-0.02em;margin:28px 0 14px}

/* ── OPPORTUNITY LIST ── */
.opp-list{display:flex;flex-direction:column;gap:10px}
.opp-item{background:var(--dark-3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px}
.opp-item.crit{border-left:3px solid var(--red);border-radius:4px 12px 12px 4px}
.opp-item.alta{border-left:3px solid var(--amber);border-radius:4px 12px 12px 4px}
.opp-item.media{border-left:3px solid var(--blue-light);border-radius:4px 12px 12px 4px}
.opp-tag{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:5px;flex-shrink:0;margin-top:2px}
.opp-tag.crit{background:rgba(255,71,87,0.12);color:var(--red)}
.opp-tag.alta{background:rgba(255,184,48,0.12);color:var(--amber)}
.opp-tag.media{background:rgba(42,111,212,0.12);color:var(--blue-light)}
.opp-body{flex:1}
.opp-title{font-weight:700;font-size:.9rem;margin-bottom:4px}
.opp-desc{font-size:.82rem;color:var(--text-2);line-height:1.55;margin-bottom:8px}
.opp-action{font-size:.78rem;color:var(--text-3);font-style:italic}
.opp-gain{font-weight:800;font-family:var(--mono);font-size:1.05rem;color:var(--green);text-align:right;flex-shrink:0;white-space:nowrap}
.opp-gain-lbl{font-size:.65rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.opp-empty{text-align:center;padding:48px 24px;color:var(--text-3)}
.opp-empty-icon{font-size:2.5rem;margin-bottom:12px}

/* ── PRECIFICACAO ── */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.product-card{background:var(--dark-3);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s}
.product-card:hover{border-color:rgba(15,61,145,0.4)}
.product-card.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-3);border-style:dashed;min-height:140px}
.product-name{font-weight:700;font-size:.95rem;margin-bottom:10px}
.product-row{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:6px;color:var(--text-2)}
.product-row strong{color:var(--text);font-family:var(--mono)}
.product-badge{display:inline-block;font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:5px;margin-top:8px}
.product-badge.ok{background:rgba(0,200,83,0.1);color:var(--green)}
.product-badge.warn{background:rgba(255,184,48,0.1);color:var(--amber)}
.product-badge.bad{background:rgba(255,71,87,0.1);color:var(--red)}

.form-card{max-width:560px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.result-box{background:var(--dark-4);border:1px solid var(--border);border-radius:14px;padding:24px;margin-top:20px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.result-row:last-child{border-bottom:none}
.result-row .lbl{font-size:.85rem;color:var(--text-2)}
.result-row .val{font-weight:800;font-family:var(--mono);font-size:1.1rem}
.result-row .val.min{color:var(--red)}
.result-row .val.ideal{color:var(--green)}
.result-row .val.premium{color:var(--blue-light)}

/* ── VENDAS ── */
.quick-sale-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.sale-chip{background:var(--dark-3);border:1px solid var(--border);border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s}
.sale-chip:hover{border-color:var(--green)}
.sale-chip .name{font-weight:700;font-size:.85rem;margin-bottom:4px}
.sale-chip .price{font-family:var(--mono);color:var(--green);font-size:.9rem}
.sales-list{display:flex;flex-direction:column;gap:8px}
.sale-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--dark-3);border:1px solid var(--border);border-radius:10px;font-size:.85rem}
.sale-row-info{display:flex;align-items:center;gap:12px}
.sale-row-time{color:var(--text-3);font-size:.78rem}
.sale-row-val{font-family:var(--mono);font-weight:700;color:var(--green)}

/* ── IA CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 140px);max-height:680px}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:4px 4px 16px}
.chat-bubble{max-width:80%;padding:14px 16px;border-radius:14px;font-size:.88rem;line-height:1.6}
.chat-bubble.ai{background:var(--dark-3);border:1px solid var(--border);align-self:flex-start}
.chat-bubble.user{background:var(--blue);color:var(--text);align-self:flex-end}
.chat-bubble strong{color:var(--green)}
.chat-bubble.ai strong{color:var(--green)}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chat-sugg{background:var(--dark-3);border:1px solid var(--border);border-radius:100px;padding:8px 16px;font-size:.8rem;color:var(--text-2);cursor:pointer;transition:all .2s}
.chat-sugg:hover{border-color:var(--green);color:var(--text)}
.chat-input-row{display:flex;gap:10px;padding-top:12px;border-top:1px solid var(--border)}
.chat-input-row input{flex:1}
.chat-send{background:var(--green);color:#04150A;border:none;border-radius:9px;padding:13px 20px;font-weight:700;cursor:pointer}
.chat-send:disabled{opacity:.4;cursor:not-allowed}

/* ── EMPTY STATES ── */
.empty-state{text-align:center;padding:64px 24px}
.empty-state-icon{font-size:3rem;margin-bottom:16px}
.empty-state h3{font-weight:700;font-size:1.2rem;margin-bottom:8px}
.empty-state p{color:var(--text-2);font-size:.9rem;max-width:380px;margin:0 auto 24px}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .shell{flex-direction:column}
  .sidebar{display:none}
  .mobile-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--dark-2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
  .mobile-bar-logo{display:flex;align-items:center;gap:8px}
  .mobile-bar-logo img{height:28px}
  .mobile-bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--dark-2);border-top:1px solid var(--border);z-index:50;padding:6px 0}
  .mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;background:none;border:none;color:var(--text-3);font-size:.65rem;cursor:pointer}
  .mobile-nav-item.active{color:var(--green)}
  .mobile-nav-icon{font-size:1.2rem}
  .main{padding:20px 16px 80px;max-width:100%}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .auth-card{padding:28px 24px}
}

/* ── ANIM ── */
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

</style>

<body>
<div class="app-bg"></div>
<div id="root"></div>
<script type="text/babel" data-presets="react">
// ============================================================
// LUCRO CERTO MEI — APP REAL
// Auth + Onboarding + Raio-X + Dashboard + Vendas + IA
// Persistência: localStorage (multi-usuário)
// ============================================================
const {useState, useEffect, useMemo} = React;

// ── STORAGE HELPERS ──────────────────────────────────────
const DB_KEY = 'lcm_db_v1';
function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    return raw ? JSON.parse(raw) : {users:{}, session:null};
  }catch(e){ return {users:{}, session:null}; }
}
function saveDB(db){
  localStorage.setItem(DB_KEY, JSON.stringify(db));
}

// ── BENCHMARKS POR SEGMENTO ──────────────────────────────
const SEGMENTOS = {
  beleza:     {label:'Beleza e Estética',      margem:0.32, emoji:'💇'},
  alimentacao:{label:'Alimentação',            margem:0.28, emoji:'🍔'},
  servicos:   {label:'Prestação de Serviços',  margem:0.38, emoji:'🛠️'},
  comercio:   {label:'Comércio / Revenda',     margem:0.22, emoji:'🛍️'},
  tecnologia: {label:'Tecnologia / Digital',   margem:0.45, emoji:'💻'},
  saude:      {label:'Saúde e Bem-estar',      margem:0.40, emoji:'🩺'},
  educacao:   {label:'Educação / Cursos',      margem:0.50, emoji:'📚'},
  outros:     {label:'Outro',                  margem:0.30, emoji:'📦'},
};

const fmt = n => 'R$ ' + Math.round(n).toLocaleString('pt-BR');
const fmtPct = n => Math.round(n) + '%';
const uid = () => Math.random().toString(36).slice(2,10);

// ── LOGO COMPONENT (SVG nativo) ──────────────────────────
function LogoMark({size=36}){
  return (
    <svg width={size} height={size} viewBox="0 0 36 36" fill="none" aria-hidden="true">
      <rect width="36" height="36" rx="8" fill="#0F3D91"/>
      <path d="M9 8 L9 28 L27 28 L27 22 L16 22 L16 8 Z" fill="white"/>
      <path d="M30 11 C30 11 36 14 36 18 C36 22 30 25 30 25" stroke="#00C853" strokeWidth="3.5" strokeLinecap="round" fill="none"/>
    </svg>
  );
}

// ── RAIO-X ENGINE ─────────────────────────────────────────
function runRaioX(profile, products, indirectCosts){
  const segMargin = (SEGMENTOS[profile.segmento]||SEGMENTOS.outros).margem;
  const opportunities = [];

  const proLabore = indirectCosts.proLabore || 0;
  const otherFixed = indirectCosts.outros || 0;
  const totalFixed = proLabore + otherFixed;

  let totalLucroAtual = 0;
  let totalLucroPotencial = 0;

  products.forEach(p => {
    const custoDirecto = p.custoDirecto || 0;
    const volumeMensal = p.volumeMensal || 0;
    const precoAtual = p.precoAtual || 0;

    const totalVolume = products.reduce((s,x)=>s+(x.volumeMensal||0),0) || 1;
    const rateioFixo = (totalFixed * (volumeMensal/totalVolume)) / Math.max(volumeMensal,1);

    const custoTotal = custoDirecto + rateioFixo;
    const precoMinimo = custoTotal / (1 - 0.15);
    const precoIdeal = custoTotal / (1 - segMargin);

    const lucroAtualUnit = precoAtual - custoTotal;
    const lucroAtualMensal = lucroAtualUnit * volumeMensal;
    totalLucroAtual += lucroAtualMensal;

    const lucroIdealUnit = precoIdeal - custoTotal;
    const lucroIdealMensal = lucroIdealUnit * volumeMensal;

    if(precoAtual < precoMinimo && volumeMensal > 0){
      const perdaUnit = precoMinimo - precoAtual;
      const perdaMensal = perdaUnit * volumeMensal;
      opportunities.push({
        tipo:'PRECO_ABAIXO_MINIMO', prioridade:'CRITICA',
        titulo: `${p.nome}: você está no prejuízo`,
        descricao: `Cada venda custa ${fmt(custoTotal)} e você cobra ${fmt(precoAtual)}. Prejuízo de ${fmt(perdaUnit)} por venda.`,
        acao: `Ajustar para no mínimo ${fmt(precoMinimo)} imediatamente`,
        ganhoMensal: perdaMensal,
        produtoId: p.id
      });
      totalLucroPotencial += lucroIdealMensal;
    }
    else if(precoAtual < precoIdeal * 0.92 && volumeMensal > 0){
      const deltaUnit = precoIdeal - precoAtual;
      const ganhoMensal = deltaUnit * volumeMensal;
      opportunities.push({
        tipo:'PRECO_ABAIXO_IDEAL', prioridade:'ALTA',
        titulo: `${p.nome}: margem abaixo do ideal`,
        descricao: `Sua margem atual é ${fmtPct((lucroAtualUnit/precoAtual)*100)}. O ideal para o seu segmento é ${fmtPct(segMargin*100)}.`,
        acao: `Aumentar para ${fmt(precoIdeal)} (+${fmtPct((precoIdeal/precoAtual-1)*100)})`,
        ganhoMensal,
        produtoId: p.id
      });
      totalLucroPotencial += lucroIdealMensal;
    } else {
      totalLucroPotencial += Math.max(lucroAtualMensal, lucroIdealMensal);
    }
  });

  if(proLabore === 0 && products.length > 0){
    const salarioMinimo = 1412;
    opportunities.push({
      tipo:'PRO_LABORE_AUSENTE', prioridade:'CRITICA',
      titulo: 'Seu trabalho não está sendo pago',
      descricao: 'Você não incluiu pró-labore nos custos fixos. Está trabalhando sem se remunerar — seu custo real é maior do que pensa.',
      acao: `Incluir pró-labore de pelo menos ${fmt(salarioMinimo)}/mês e recalcular preços`,
      ganhoMensal: salarioMinimo,
      produtoId: null
    });
  }

  const receitaTotal = totalLucroAtual + totalFixed;
  if(receitaTotal > 0 && profile.clientesInativos > 0){
    const ticketMedio = receitaTotal / Math.max(products.reduce((s,x)=>s+(x.volumeMensal||0),0),1);
    const ganhoMensal = profile.clientesInativos * ticketMedio * 0.30;
    if(ganhoMensal > 100){
      opportunities.push({
        tipo:'CLIENTES_INATIVOS', prioridade:'ALTA',
        titulo: `${profile.clientesInativos} clientes inativos`,
        descricao: `Não compram há mais de 60 dias. Com uma mensagem de reativação, você pode recuperar cerca de 30% deles.`,
        acao: `Gerar mensagem de reativação para ${profile.clientesInativos} clientes`,
        ganhoMensal,
        produtoId: null
      });
    }
    totalLucroPotencial += ganhoMensal;
  }

  opportunities.sort((a,b)=>b.ganhoMensal - a.ganhoMensal);
  const diferenca = opportunities.reduce((s,o)=>s+o.ganhoMensal,0);

  return {
    lucroAtual: totalLucroAtual,
    lucroPotencial: totalLucroAtual + diferenca,
    diferenca,
    impactoAnual: diferenca * 12,
    oportunidades: opportunities,
    geradoEm: new Date().toISOString()
  };
}

// ── BUSINESS SCORE ENGINE ─────────────────────────────────
function calculateScore(profile, products, indirectCosts, raioX){
  let score = 50;
  const critOps = raioX.oportunidades.filter(o=>o.prioridade==='CRITICA').length;
  const altaOps = raioX.oportunidades.filter(o=>o.prioridade==='ALTA').length;
  score -= critOps * 15;
  score -= altaOps * 7;
  if((indirectCosts.proLabore||0) > 0) score += 10;
  if(products.length >= 3) score += 10;
  else if(products.length >= 1) score += 5;
  if(profile.metaLucro > 0) score += 8;
  if(raioX.lucroAtual > 0) score += 12;
  score = Math.max(5, Math.min(100, Math.round(score)));

  let level, emoji;
  if(score >= 90){level='Black'; emoji='⚫';}
  else if(score >= 78){level='Diamante'; emoji='💎';}
  else if(score >= 62){level='Ouro'; emoji='🥇';}
  else if(score >= 45){level='Prata'; emoji='🥈';}
  else {level='Bronze'; emoji='🥉';}

  return {score, level, emoji};
}

// ── COMPONENTE: ONBOARDING ─────────────────────────────────
function OnboardingScreen({user, onComplete}){
  const [step,setStep] = useState(0);
  const [segmento,setSegmento] = useState('beleza');
  const [metaLucro,setMetaLucro] = useState('');
  const [produto,setProduto] = useState({nome:'', precoAtual:'', custoDirecto:'', volumeMensal:''});
  const [proLabore,setProLabore] = useState('');

  const steps = ['Segmento','Meta','Produto','Custos'];

  function finish(){
    const db = loadDB();
    const u = db.users[user.id];
    u.profile.segmento = segmento;
    u.profile.metaLucro = parseFloat(metaLucro)||0;
    u.profile.clientesInativos = 0;
    u.indirectCosts.proLabore = parseFloat(proLabore)||0;
    if(produto.nome){
      u.products.push({
        id: uid(),
        nome: produto.nome,
        precoAtual: parseFloat(produto.precoAtual)||0,
        custoDirecto: parseFloat(produto.custoDirecto)||0,
        volumeMensal: parseFloat(produto.volumeMensal)||0,
      });
    }
    u.onboarded = true;
    db.users[user.id] = u;
    saveDB(db);
    onComplete(u);
  }

  return (
    <div className="auth-wrap">
      <div className="auth-card fade-in" style={{maxWidth:480}}>
        <div className="auth-logo">
          <LogoMark size={38}/>
          <div className="auth-logo-text">
            <span className="l1">Lucro <span>Certo</span></span>
            <span className="l2">MEI</span>
          </div>
        </div>
        <div className="onboard-progress">
          {steps.map((s,i)=>(
            <div key={i} className={`onboard-dot ${i<step?'done':i===step?'active':''}`}/>
          ))}
        </div>

        {step===0 && (
          <>
            <h1 className="auth-title">Qual é o seu segmento?</h1>
            <p className="auth-sub">Isso ajuda a IA a comparar sua margem com a média de mercado.</p>

                <div key={key} className={`chip ${segmento===key?'selected':''}`} onClick={()=>setSegmento(key)}>
                  <span className="chip-emoji">{seg.emoji}</span>
                  {seg.label}
                </div>
              ))}
            </div>
            <button className="btn btn-primary" onClick={()=>setStep(1)}>Continuar</button>
          </>
        )}

        {step===1 && (
          <>
            <h1 className="auth-title">Quanto você quer ganhar por mês?</h1>
            <p className="auth-sub">Essa é a sua Meta de Lucro. A IA vai te ajudar a chegar lá.</p>
            <div className="field">
              <label>Meta mensal de lucro (R$)</label>
              <input type="number" value={metaLucro} onChange={e=>setMetaLucro(e.target.value)} placeholder="Ex: 5000" autoFocus/>
            </div>
            <button className="btn btn-primary" onClick={()=>setStep(2)} disabled={!metaLucro}>Continuar</button>
            <button className="btn btn-ghost" style={{width:'100%',marginTop:8}} onClick={()=>setStep(2)}>Pular por agora</button>
          </>
        )}

        {step===2 && (
          <>
            <h1 className="auth-title">Seu principal produto ou serviço</h1>
            <p className="auth-sub">Vamos calcular se o preço está certo.</p>
            <div className="field">
              <label>Nome</label>
              <input type="text" value={produto.nome} onChange={e=>setProduto({...produto,nome:e.target.value})} placeholder="Ex: Corte de cabelo" autoFocus/>
            </div>
            <div className="form-grid">
              <div className="field">
                <label>Preço que você cobra (R$)</label>
                <input type="number" value={produto.precoAtual} onChange={e=>setProduto({...produto,precoAtual:e.target.value})} placeholder="45"/>
              </div>
              <div className="field">
                <label>Custo direto (R$)</label>
                <input type="number" value={produto.custoDirecto} onChange={e=>setProduto({...produto,custoDirecto:e.target.value})} placeholder="12"/>
              </div>
            </div>
            <div className="field">
              <label>Quantas vendas por mês, aproximadamente?</label>
              <input type="number" value={produto.volumeMensal} onChange={e=>setProduto({...produto,volumeMensal:e.target.value})} placeholder="40"/>
            </div>
            <button className="btn btn-primary" onClick={()=>setStep(3)} disabled={!produto.nome}>Continuar</button>
            <button className="btn btn-ghost" style={{width:'100%',marginTop:8}} onClick={()=>setStep(3)}>Pular por agora</button>
          </>
        )}

        {step===3 && (
          <>

function PrecificacaoScreen({user, onAddProduct, onUpdateProduct, onDeleteProduct}){
  const [showForm,setShowForm] = useState(false);
  const [editing,setEditing] = useState(null);
  const [form,setForm] = useState({nome:'',precoAtual:'',custoDirecto:'',volumeMensal:''});

  const segMargin = (SEGMENTOS[user.profile.segmento]||SEGMENTOS.outros).margem;

  function openNew(){
    setForm({nome:'',precoAtual:'',custoDirecto:'',volumeMensal:''});
    setEditing(null);
    setShowForm(true);
  }
  function openEdit(p){
    setForm({nome:p.nome,precoAtual:String(p.precoAtual),custoDirecto:String(p.custoDirecto),volumeMensal:String(p.volumeMensal)});
    setEditing(p.id);
    setShowForm(true);
  }
  function submit(e){
    e.preventDefault();
    const data = {
      nome:form.nome,
      precoAtual:parseFloat(form.precoAtual)||0,
      custoDirecto:parseFloat(form.custoDirecto)||0,
      volumeMensal:parseFloat(form.volumeMensal)||0,
    };
    if(editing) onUpdateProduct(editing, data);
    else onAddProduct(data);
    setShowForm(false);
  }

  const previewCusto = parseFloat(form.custoDirecto)||0;
  const totalFixed = (user.indirectCosts.proLabore||0) + (user.indirectCosts.outros||0);
  const totalVolume = user.products.reduce((s,x)=>s+(x.volumeMensal||0),0) + (parseFloat(form.volumeMensal)||0);
  const rateioFixo = totalVolume>0 ? totalFixed / totalVolume : 0;
  const custoTotal = previewCusto + rateioFixo;
  const precoMinimo = custoTotal / (1-0.15);
  const precoIdeal = custoTotal / (1-segMargin);
  const precoPremium = precoIdeal * 1.30;

  return (
    <div className="fade-in">
      <div className="main-header">
        <div>
          <div className="main-title">Precificação</div>
          <div className="main-sub">Calcule o preço certo para cada produto ou serviço.</div>
        </div>
        <button className="btn btn-primary" style={{width:'auto'}} onClick={openNew}>+ Novo produto</button>
      </div>

      {showForm && (
        <div className="card form-card card-accent" style={{marginBottom:24}}>
          <div style={{fontWeight:700,marginBottom:16}}>{editing?'Editar produto':'Novo produto ou serviço'}</div>
          <form onSubmit={submit}>
            <div className="field">
              <label>Nome</label>
              <input type="text" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="Ex: Corte de cabelo" required autoFocus/>
            </div>
            <div className="form-grid">
              <div className="field">
                <label>Preço que você cobra (R$)</label>
                <input type="number" step="0.01" value={form.precoAtual} onChange={e=>setForm({...form,precoAtual:e.target.value})} placeholder="45.00" required/>
              </div>
              <div className="field">
                <label>Custo direto (R$)</label>
                <input type="number" step="0.01" value={form.custoDirecto} onChange={e=>setForm({...form,custoDirecto:e.target.value})} placeholder="12.00" required/>
              </div>
            </div>
            <div className="field">
              <label>Vendas por mês (aproximado)</label>
              <input type="number" value={form.volumeMensal} onChange={e=>setForm({...form,volumeMensal:e.target.value})} placeholder="40" required/>
            </div>

            {previewCusto > 0 && (
              <div className="result-box">
                <div className="result-row"><span className="lbl">Custo total (com rateio fixo)</span><span className="val">{fmt(custoTotal)}</span></div>
                <div className="result-row"><span className="lbl">Preço mínimo (não venda abaixo)</span><span className="val min">{fmt(precoMinimo)}</span></div>
                <div className="result-row"><span className="lbl">Preço ideal (recomendado)</span><span className="val ideal">{fmt(precoIdeal)}</span></div>
                <div className="result-row"><span className="lbl">Preço premium</span><span className="val premium">{fmt(precoPremium)}</span></div>
              </div>
            )}

            <div style={{display:'flex',gap:10,marginTop:18}}>
              <button className="btn btn-primary" type="submit">{editing?'Salvar alterações':'Adicionar produto'}</button>
              <button className="btn btn-secondary" type="button" onClick={()=>setShowForm(false)}>Cancelar</button>
            </div>
          </form>
        </div>
      )}

      {user.products.length === 0 && !showForm ? (
        <div className="empty-state">
          <div className="empty-state-icon">🎯</div>
          <h3>Nenhum produto cadastrado</h3>
          <p>Adicione seu primeiro produto ou serviço para descobrir se o preço está certo.</p>
          <button className="btn btn-primary" style={{width:'auto'}} onClick={openNew}>+ Adicionar produto</button>
        </div>
      ) : (
        <div className="products-grid">
          {user.products.map(p=>{
            const totalVol = user.products.reduce((s,x)=>s+(x.volumeMensal||0),0)||1;
            const rateio = totalFixed * ((p.volumeMensal||0)/totalVol) / Math.max(p.volumeMensal,1);
            const custoTotal = (p.custoDirecto||0) + rateio;
            const precoMinimo = custoTotal/(1-0.15);
            const precoIdeal = custoTotal/(1-segMargin);
            const margem = p.precoAtual>0 ? ((p.precoAtual-custoTotal)/p.precoAtual)*100 : 0;
            let badge = {cls:'ok',label:'Saudável'};
            if(p.precoAtual < precoMinimo) badge = {cls:'bad',label:'Prejuízo'};
            else if(p.precoAtual < precoIdeal*0.92) badge = {cls:'warn',label:'Margem baixa'};

            return (
              <div key={p.id} className="product-card" onClick={()=>openEdit(p)}>
                <div className="product-name">{p.nome}</div>
                <div className="product-row"><span>Você cobra</span><strong>{fmt(p.precoAtual)}</strong></div>
                <div className="product-row"><span>Custo total</span><strong>{fmt(custoTotal)}</strong></div>
                <div className="product-row"><span>Margem</span><strong>{fmtPct(margem)}</strong></div>
                <div className="product-row"><span>Vendas/mês</span><strong>{p.volumeMensal}</strong></div>
                <span className={`product-badge ${badge.cls}`}>{badge.label}</span>
                <div style={{marginTop:10,display:'flex',gap:8}}>
                  <button className="btn-ghost" onClick={(e)=>{e.stopPropagation();onDeleteProduct(p.id)}} style={{color:'var(--red)',padding:0}}>Excluir</button>
                </div>
              </div>
            );
          })}
          <div className="product-card empty" onClick={openNew}>
            <div style={{fontSize:'1.8rem',marginBottom:8}}>+</div>
            Novo produto
          </div>
        </div>
      )}
    </div>
  );
}

// ── COMPONENTE: VENDAS ────────────────────────────────────
function VendasScreen({user, onAddSale}){
  const [custom,setCustom] = useState({nome:'',valor:''});
  const [showCustom,setShowCustom] = useState(false);

  const today = new Date().toDateString();
  const todaySales = user.sales.filter(s=>new Date(s.date).toDateString()===today);
  const todayTotal = todaySales.reduce((s,x)=>s+x.valor,0);
  const meta = user.profile.metaLucro||0;
  const metaDiaria = meta>0 ? meta/22 : 0;

  function registrar(produto){
    onAddSale({
      id: uid(),
      nome: produto.nome,
      valor: produto.valor,
      date: new Date().toISOString(),
    });
  }
  function submitCustom(e){
    e.preventDefault();
    if(!custom.nome || !custom.valor) return;
    registrar({nome:custom.nome, valor:parseFloat(custom.valor)||0});
    setCustom({nome:'',valor:''});
    setShowCustom(false);
  }

  return (
    <div className="fade-in">
      <div className="main-header">
        <div>
          <div className="main-title">Registro de vendas</div>
          <div className="main-sub">Registre uma venda em segundos.</div>
        </div>
      </div>

      {meta > 0 && (
        <div className="card goal-card card-accent">
          <div className="goal-header">
            <div className="goal-title">Meta de hoje</div>
            <div className="goal-pct">{fmt(todayTotal)} / {fmt(metaDiaria)}</div>
          </div>
          <div className="goal-bar-bg">
            <div className="goal-bar-fill" style={{width:Math.min(100,(todayTotal/Math.max(metaDiaria,1))*100)+'%'}}/>
          </div>
        </div>
      )}

      <div className="section-title">Registrar venda rápida</div>
      <div className="quick-sale-grid">
        {user.products.map(p=>(
          <div key={p.id} className="sale-chip" onClick={()=>registrar({nome:p.nome,valor:p.precoAtual})}>
            <div className="name">{p.nome}</div>
            <div className="price">{fmt(p.precoAtual)}</div>
          </div>
        ))}
        <div className="sale-chip" onClick={()=>setShowCustom(!showCustom)} style={{borderStyle:'dashed'}}>
          <div className="name">+ Outro</div>
        </div>
      </div>

      {showCustom && (
        <form onSubmit={submitCustom} className="card" style={{marginBottom:20}}>
          <div className="form-grid">
            <div className="field" style={{marginBottom:0}}>
              <label>Descrição</label>
              <input type="text" value={custom.nome} onChange={e=>setCustom({...custom,nome:e.target.value})} placeholder="Venda avulsa" autoFocus/>
            </div>
            <div className="field" style={{marginBottom:0}}>
              <label>Valor (R$)</label>
              <input type="number" step="0.01" value={custom.valor} onChange={e=>setCustom({...custom,valor:e.target.value})} placeholder="50.00"/>
            </div>
          </div>
          <button className="btn btn-primary" type="submit" style={{marginTop:14}}>Registrar</button>
        </form>
      )}

      <div className="section-title">Vendas recentes</div>
      {user.sales.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state-icon">💰</div>
          <h3>Nenhuma venda registrada ainda</h3>
          <p>Clique em um dos produtos acima para registrar sua primeira venda.</p>
        </div>
      ) : (
        <div className="sales-list">
          {user.sales.slice().reverse().slice(0,15).map(s=>(
            <div key={s.id} className="sale-row">
              <div className="sale-row-info">
                <span>{s.nome}</span>
                <span className="sale-row-time">{new Date(s.date).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
              </div>
              <span className="sale-row-val">+{fmt(s.valor)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── COMPONENTE: IA CHAT ───────────────────────────────────
const SUGGESTIONS = [
  'Estou cobrando pouco?',
  'Qual produto é mais lucrativo?',
  'Quanto preciso vender para atingir minha meta?',
  'Posso contratar alguém?',
];

function generateAIResponse(question, user, raioX, score){
  const q = question.toLowerCase();
  const meta = user.profile.metaLucro||0;
  const lucroAtual = raioX.lucroAtual;

  if(q.includes('cobrando pouco') || q.includes('preço') || q.includes('aumentar')){
    const critOps = raioX.oportunidades.filter(o=>o.tipo.includes('PRECO'));
    if(critOps.length===0){
      return `Pelos dados que você cadastrou, seus preços estão saudáveis para o seu segmento. Continue monitorando a margem conforme seus custos mudam.`;
    }
    const top = critOps[0];
    return `Sim. ${top.descricao}\n\n**Ação recomendada:** ${top.acao}\n\n**Impacto:** +${fmt(top.ganhoMensal)}/mês, ou ${fmt(top.ganhoMensal*12)} por ano.`;
  }

  if(q.includes('mais lucrativo') || q.includes('produto')){
    if(user.products.length===0) return 'Você ainda não cadastrou produtos. Vá em Precificação para adicionar o primeiro.';
    const totalFixed = (user.indirectCosts.proLabore||0)+(user.indirectCosts.outros||0);
    const totalVol = user.products.reduce((s,x)=>s+(x.volumeMensal||0),0)||1;
    const ranked = user.products.map(p=>{
      const rateio = totalFixed*((p.volumeMensal||0)/totalVol)/Math.max(p.volumeMensal,1);
      const custo = (p.custoDirecto||0)+rateio;
      const margemUnit = p.precoAtual-custo;
      return {...p, margemUnit, margemPct: p.precoAtual>0?(margemUnit/p.precoAtual)*100:0, lucroMensal: margemUnit*(p.volumeMensal||0)};
    }).sort((a,b)=>b.lucroMensal-a.lucroMensal);
    const best = ranked[0];
    return `**${best.nome}** é seu produto mais lucrativo: gera ${fmt(best.lucroMensal)}/mês com margem de ${fmtPct(best.margemPct)}.\n\nFocar em vender mais desse item é o caminho mais rápido para aumentar seu lucro com o mesmo esforço.`;
  }

  if(q.includes('meta') || q.includes('vender')){
    if(meta===0) return 'Você ainda não definiu uma meta de lucro. Vá em Dashboard ou nas configurações para definir quanto quer ganhar por mês.';
    const falta = meta - lucroAtual;
    if(falta<=0) return `Você já atingiu sua meta de ${fmt(meta)}! 🎉 Considere aumentar a meta do próximo mês em 10-15% para continuar crescendo.`;
    const bestProduct = user.products.length>0 ? user.products[0] : null;
    const vendasNecessarias = bestProduct && bestProduct.precoAtual>0 ? Math.ceil(falta/(bestProduct.precoAtual*0.3)) : null;
    let resp = `Faltam ${fmt(falta)} para sua meta de ${fmt(meta)}.`;
    if(vendasNecessarias) resp += `\n\nSe a margem média for de 30%, você precisaria de aproximadamente **${vendasNecessarias} vendas adicionais** de "${bestProduct.nome}" este mês para chegar lá.`;
    return resp;
  }

  if(q.includes('contratar') || q.includes('funcionário') || q.includes('funcionario')){
    const salarioMinimo = 1412;
    const custoFuncionario = salarioMinimo * 1.7;
    if(lucroAtual > custoFuncionario*1.5){
      return `Seu lucro atual de ${fmt(lucroAtual)}/mês dá espaço para considerar.\n\nUm funcionário CLT custa aproximadamente ${fmt(custoFuncionario)}/mês (salário + encargos).\n\nPara não reduzir seu lucro, você precisaria de um aumento de receita de pelo menos ${fmt(custoFuncionario*1.5)}/mês com a ajuda dessa pessoa. Você acha que ela dobraria sua capacidade de atendimento?`;
    }
    return `Com lucro atual de ${fmt(lucroAtual)}/mês, contratar agora é arriscado — um funcionário CLT custa em torno de ${fmt(custoFuncionario)}/mês com encargos.\n\nConsidere primeiro resolver as oportunidades de precificação no Raio-X. Isso aumenta sua margem antes de aumentar custos fixos.`;
  }

  if(q.includes('prejuízo') || q.includes('prejuizo')){
    const critOps = raioX.oportunidades.filter(o=>o.prioridade==='CRITICA');
    if(critOps.length===0) return 'Não identifiquei nenhum produto com prejuízo direto nos dados cadastrados. Seu lucro atual é de '+fmt(lucroAtual)+'/mês.';
    return `Sim, encontrei ${critOps.length} ponto(s) crítico(s):\n\n` + critOps.map(o=>`• ${o.titulo} — ${o.descricao}`).join('\n');
  }

  return `Com base nos seus dados: seu lucro atual é ${fmt(lucroAtual)}/mês e identifiquei ${raioX.oportunidades.length} oportunidade(s) totalizando +${fmt(raioX.diferenca)}/mês.\n\nPergunte sobre preços, produtos, metas ou se vale contratar alguém — vou responder com base nos seus números reais.`;
}

function IAScreen({user, raioX, score}){
  const [messages,setMessages] = useState([
    {role:'ai', text:`Olá, ${user.name.split(' ')[0]}! Sou o CFO Digital do Lucro Certo MEI.\n\nSeu score hoje é **${score.score}/100** (${score.level}) e identifiquei **${raioX.oportunidades.length} oportunidade(s)** somando +${fmt(raioX.diferenca)}/mês.\n\nPergunte qualquer coisa sobre seus números.`}
  ]);
  const [input,setInput] = useState('');

  function send(text){
    if(!text.trim()) return;
    const userMsg = {role:'user', text};
    const aiMsg = {role:'ai', text: generateAIResponse(text, user, raioX, score)};
    setMessages(m=>[...m, userMsg, aiMsg]);
    setInput('');
  }

  return (
    <div className="fade-in">
      <div className="main-header">
        <div>
          <div className="main-title">CFO Digital IA</div>
          <div className="main-sub">Pergunte sobre seus números reais.</div>
        </div>
      </div>
      <div className="chat-wrap card card-accent">
        <div className="chat-messages">
          {messages.map((m,i)=>(
            <div key={i} className={`chat-bubble ${m.role}`} style={{whiteSpace:'pre-wrap'}}>
              {m.text.split('**').map((part,j)=> j%2===1 ? <strong key={j}>{part}</strong> : part)}
            </div>
          ))}
        </div>
        {messages.length<=1 && (
          <div className="chat-suggestions">
            {SUGGESTIONS.map((s,i)=>(
              <div key={i} className="chat-sugg" onClick={()=>send(s)}>{s}</div>
            ))}
          </div>
        )}
        <form className="chat-input-row" onSubmit={e=>{e.preventDefault();send(input)}}>
          <input type="text" value={input} onChange={e=>setInput(e.target.value)} placeholder="Pergunte sobre seu negócio..."/>
          <button className="chat-send" type="submit" disabled={!input.trim()}>Enviar</button>
        </form>
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────
function App(){
  const [view,setView] = useState('login');
  const [user,setUser] = useState(null);
  const [activeTab,setActiveTab] = useState('dashboard');

  useEffect(()=>{
    const db = loadDB();
    if(db.session && db.users[db.session]){
      const u = db.users[db.session];
      setUser(u);
      setView(u.onboarded ? 'app' : 'onboarding');
    }
  },[]);

  function refreshUser(updatedUser){
    const db = loadDB();
    db.users[updatedUser.id] = updatedUser;
    saveDB(db);
    setUser(updatedUser);
  }

  function handleLogout(){
    const db = loadDB();
    db.session = null;
    saveDB(db);
    setUser(null);
    setView('login');
  }

  function addProduct(data){
    const u = {...user, products:[...user.products, {id:uid(), ...data}]};
    refreshUser(u);
  }
  function updateProduct(id, data){
    const u = {...user, products: user.products.map(p=>p.id===id?{...p,...data}:p)};
    refreshUser(u);
  }
  function deleteProduct(id){
    const u = {...user, products: user.products.filter(p=>p.id!==id)};
    refreshUser(u);
  }
  function addSale(sale){
    const u = {...user, sales:[...user.sales, sale]};
    refreshUser(u);
  }
  function updateProfile(profile){
    const u = {...user, profile};
    refreshUser(u);
  }

  const raioX = useMemo(()=>{
    if(!user) return null;
    return runRaioX(user.profile, user.products, user.indirectCosts);
  },[user]);

  const score = useMemo(()=>{
    if(!user || !raioX) return null;
    return calculateScore(user.profile, user.products, user.indirectCosts, raioX);
  },[user, raioX]);

  if(view==='login'){
    return <LoginScreen onLogin={(u)=>{setUser(u); setView(u.onboarded?'app':'onboarding');}} onGoRegister={()=>setView('register')}/>;
  }
  if(view==='register'){
    return <RegisterScreen onRegister={(u)=>{setUser(u); setView('onboarding');}} onGoLogin={()=>setView('login')}/>;
  }
  if(view==='onboarding'){
    return <OnboardingScreen user={user} onComplete={(u)=>{setUser(u); setView('app');}}/>;
  }

  if(!user || !raioX || !score) return null;

  return (
    <div className="shell">
      <Sidebar active={activeTab} onNavigate={setActiveTab} user={user} onLogout={handleLogout}/>
      <div className="mobile-bar">
        <div className="mobile-bar-logo">
          <LogoMark size={28}/>
          <span style={{fontWeight:800,fontSize:'.9rem'}}>Lucro <span style={{color:'#00C853'}}>Certo</span></span>
        </div>
        <button className="sb-logout" onClick={handleLogout}>Sair</button>
      </div>
      <div className="main">
        {activeTab==='dashboard' && <Dashboard user={user} raioX={raioX} score={score} onNavigate={setActiveTab}/>}
        {activeTab==='raiox' && <RaioXScreen user={user} raioX={raioX} onUpdateProfile={updateProfile}/>}
        {activeTab==='precificacao' && <PrecificacaoScreen user={user} onAddProduct={addProduct} onUpdateProduct={updateProduct} onDeleteProduct={deleteProduct}/>}
        {activeTab==='vendas' && <VendasScreen user={user} onAddSale={addSale}/>}
        {activeTab==='ia' && <IAScreen user={user} raioX={raioX} score={score}/>}
      </div>
      <MobileBottomNav active={activeTab} onNavigate={setActiveTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
